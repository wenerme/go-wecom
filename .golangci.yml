version: "2"

run:
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - client_gen_

linters:
  disable-all: true
  enable:
    - depguard
    - dogsled
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - revive
    - gosec
    - misspell
    - unconvert
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - funlen
          - gosec
      - linters:
          - gocritic
        text: "unnecessaryDefer:"
      - path: client_gen_
        linters:
          - funlen
          - goconst
          - dupl
          - misspell
      - path: WeWorkFinanceSDK
        linters:
          - unconvert
          - staticcheck
          - revive
          - gocritic
          - gocyclo
          - gosec
          - ineffassign
      - path: commons/
        linters:
          - revive
      - path: wecom/models/
        linters:
          - revive
      - path: cmd/
        linters:
          - revive
          - gosec
      - text: "safty"
        linters:
          - misspell
      # G115 integer overflow - acceptable in this context
      - text: "G115"
        linters:
          - gosec
      # G304 file inclusion via variable - acceptable in test code
      - text: "G304"
        linters:
          - gosec

  settings:
    dupl:
      threshold: 100
    funlen:
      lines: 100
      statements: 60
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    depguard:
      rules:
        main:
          deny:
            - pkg: golang.org/x/net/context
              desc: use standard library context
            - pkg: github.com/prometheus/common/log
              desc: use log/slog
